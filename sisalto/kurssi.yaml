# kurssi.yaml — kurssin rakenne ja näkymäkonfiguraatiot (yksi totuuden lähde)
#
# Rakenneuudistus 2: generaattori lukee moduulit, tunnit ja näkymät tästä
# tiedostosta. Uusi tunti = kansio sisalto/tunnit/NN/ + rivi tähän manifestiin.
# Uusi näkymä = uusi nakymat-avain — ei koodimuutosta.
#
# HUOM: tuntien id:t (lesson-NN) ovat localStorage- ja GA-avaimia sekä
# vanhojen hash-linkkien osia — niitä EI saa muuttaa (ks. CLAUDE.md).

kurssi:
  nimi: "AI · Perusteet"
  domain: aiperusteet.fi
  laajuus_osp: 3
  yleisolupaus: "AI · Perusteet on avoin, suomenkielinen alkeiskurssi kaikille tekoälyn perusteista kiinnostuneille. Kurssi opettaa käyttämään tekoälyä sekä tunnistamaan, selittämään, testaamaan, arvioimaan ja perustelemaan siihen liittyviä väitteitä ja ratkaisuja. Aiempi tekninen osaaminen, tietty opiskeluala tai työkokemus ei ole edellytys. Luokka- ja opettajanäkymät tarjoavat lisäksi oppilaitoskäyttöön sovitetun toteutuksen."
  esitiedot: "Ei esitietovaatimuksia. Tavallinen verkkoselain riittää, ja tililliset kokeet voi korvata dokumentoidulla suunnittelusuorituksella."
  laajuuskuvaus: "Avoin verkkokurssi on mitoitettu kolmen osaamispisteen laajuiseksi. Osaamispisteiden myöntämisestä päättää oppilaitos, eikä sivusto itsessään myönnä opintosuoritusta."
  educational_level: "Aloittelija / perustaso"

# Kurssin yhteinen ajattelutaitojen selkäranka. Sama viiden liikkeen malli
# näytetään kurssin yleiskuvassa, moduulisivuilla ja jokaisella tuntisivulla.
ajattelu:
  lupaus: "Et vain käytä tekoälyä. Opit tunnistamaan ilmiön, selittämään sen toiminnan, testaamaan väitteen tai ratkaisun, arvioimaan tuloksen ja perustelemaan johtopäätöksesi."
  liikkeet:
    - { id: tunnista, nimi: "Tunnista", ohje: "Nimeä ilmiö, tarve tai riski." }
    - { id: selita, nimi: "Selitä", ohje: "Kuvaa, miten tulos syntyy." }
    - { id: testaa, nimi: "Testaa", ohje: "Kokeile ja selvitä, missä rajat tulevat vastaan." }
    - { id: arvioi, nimi: "Arvioi", ohje: "Suhteuta tulos tavoitteeseen, lähteisiin ja riskeihin." }
    - { id: perustele, nimi: "Perustele", ohje: "Tee johtopäätös ja näytä sen peruste." }

# Tunnin kanoniset lohkot (block contract) — tiedostot sisalto/tunnit/NN/:ssä.
# Arviointitunneilta (tyyppi: assessment) puuttuu harjoittele.md tarkoituksella.
lohkot:
  teoria:           teoria.md
  sanasto:          sanasto.md
  harjoittele:      harjoittele.md
  tehtavat-luokka:  tehtavat-luokka.md
  # Lopputyön askel = tehtavat-luokka.md:stä poimittu osatuotos-osio (ks. tuntien
  # lopputyon_askel-kenttä). Nostetaan verkkokurssinäkymään omaksi välilehdeksi.
  lopputyon-askel:  tehtavat-luokka.md
  diat:             diat.html
  tuntisuunnitelma: opettaja/tuntisuunnitelma.md
  tehtavat-ohjatut: opettaja/tehtavat-ohjatut.md

# Näkymät = suodattimia samaan sisältögraafiin (suunnitelman 2.2-taulukko datana).
# Järjestys = välilehtien/lohkojen esitysjärjestys tuntisivulla.
nakymat:
  kurssi:
    polku: /kurssi/
    # Lopputyön askel heti harjoittelun perään: se on kurssin suorittamisen
    # kannalta työvaihe, ei hakuteos kuten sanasto. Järjestys ohjaa myös
    # oppimispolun ketjukortteja (ks. generator/sivut.py, WORK_BLOCKS).
    lohkot: [teoria, harjoittele, lopputyon-askel, sanasto, diat]
    kesto: lukuaika          # generaattori laskee sanamäärästä
    lopputyo_variantti: verkko
  luokka:
    polku: /luokka/
    lohkot: [teoria, tehtavat-luokka, harjoittele, sanasto, diat]
    kesto: oppitunti         # "90 min oppitunti"
    lopputyo_variantti: luokka
  opettaja:
    polku: /opettaja/
    lohkot: [tuntisuunnitelma, tehtavat-ohjatut, diat]
    kesto: oppitunti
    # Opettaja näkee luokkavariantin (pisteytys, oppimisympäristö) JA mahdolliset
    # opettajalle merkityt lisälohkot — muuten arviointiohjeet katoaisivat.
    lopputyo_variantti: [luokka, opettaja]

moduulit:
  - id: osp1
    slug: teoria
    otsikko: "Teoria"
    alaotsikko: "Tekoälyn teoria ja toimintaperiaatteet"
    vari: "var(--blue)"
    ikoni: "📐"
    lopputyo: lopputyot/teoria.md
    ajattelukaari:
      tunnista: "Tekoälyväite"
      selita: "Toimintaperiaate"
      testaa: "Mekanismin rajat"
      arvioi: "Luotettavuus ja vastuu"
      perustele: "Asiantuntijalausunto"
    tunnit:
      - { id: lesson-01, kansio: "01", otsikko: "Älykäs vai sääntö? — mitä tekoäly oikeasti tekee", tyyppi: teaching, ajattelu: { painotus: tunnista, kysymys: "Mistä voit päätellä, noudattaako järjestelmä sääntöä vai oppiiko se esimerkeistä?" } }
      - { id: lesson-02, kansio: "02", otsikko: "Miten tekoälymalli oppii — ja mitä nykyjärjestelmät osaavat?", tyyppi: teaching, ajattelu: { painotus: selita, kysymys: "Miten aineiston jako, yleistyminen ja käytön aikainen seuranta vaikuttavat mallin luotettavuuteen?" } }
      - { id: lesson-03, kansio: "03", otsikko: "Miten kone kirjoittaa? — generatiivisen AI:n mekaniikka", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: selita, kysymys: "Miten kielimalli tuottaa seuraavan tokenin, ja miksi sujuva teksti voi silti olla väärässä?" } }
      - { id: lesson-04, kansio: "04", otsikko: "Konteksti ratkaisee — miksi sama kysymys antaa eri vastauksen", tyyppi: teaching, ajattelu: { painotus: testaa, kysymys: "Miten sama pyyntö muuttuu, kun vaihdat vain kontekstia?" } }
      - { id: lesson-05, kansio: "05", otsikko: "Muistin rajat — kuinka paljon tekoäly oikeasti muistaa", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: testaa, kysymys: "Missä olennainen ohje katoaa keskustelusta, ja miten osoitat sen kokeella?" } }
      - { id: lesson-06, kansio: "06", otsikko: "Kuvat, ääni ja teksti — kun sanat eivät riitä", tyyppi: teaching, ajattelu: { painotus: arvioi, kysymys: "Mitä tietoa kukin aineistomuoto säilyttää, ja mitä mallin tulkinnasta pitää tarkistaa?" } }
      - { id: lesson-07, kansio: "07", otsikko: "Milloin tekoälyn tulokseen voi luottaa? — hallusinaatiot ja luokitteluvirheet", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: arvioi, kysymys: "Mitä virhetyyppi, mittari ja seuraus kertovat tuloksen luotettavuudesta?" } }
      - { id: lesson-08, kansio: "08", otsikko: "Keneen tekoäly vaikuttaa? — etiikka, oikeudet ja vastuu", tyyppi: teaching, ajattelu: { painotus: arvioi, kysymys: "Ketä data edustaa, keneen käyttö vaikuttaa ja kuka vastaa valvonnasta?" } }
      - { id: lesson-09, kansio: "09", otsikko: "Tuomaripöydän päätös — asiantuntijalausunto tekoälystä", tyyppi: teaching, ajattelu: { painotus: perustele, kysymys: "Miten todistusaineistosi tukee johtopäätöstäsi ja vastuusuositustasi?" } }
  - id: osp2
    slug: kaytto
    otsikko: "Tekoälyjen käyttö"
    alaotsikko: "Generatiivisten tekoälytyökalujen käyttö"
    vari: "var(--violet)"
    ikoni: "🛠"
    lopputyo: lopputyot/kaytto.md
    ajattelukaari:
      tunnista: "Tarve ja aineisto"
      selita: "Promptin, botin ja tietopohjan rakenne"
      testaa: "Vastaukset ja rajat"
      arvioi: "Laatu ja tietosuoja"
      perustele: "Rakennusvalinnat ja korjaukset"
    tunnit:
      - { id: lesson-10, kansio: "10", otsikko: "Kilpailuta tekoälyt — vertaa ennen kuin valitset", tyyppi: teaching, ajattelu: { painotus: arvioi, kysymys: "Ovatko vertailun ehdot samat, ja mikä havainto todella ratkaisee valinnan?" } }
      - { id: lesson-11, kansio: "11", otsikko: "Minne aineistosi menee? — pilvipalvelu, paikallinen ajo ja tietosuoja", tyyppi: teaching, ajattelu: { painotus: arvioi, kysymys: "Mihin aineisto kulkee, millä ehdoilla sitä käsitellään ja saako ratkaisua käyttää?" } }
      - { id: lesson-12, kansio: "12", otsikko: "Rakenna uudelleen käytettävä promptikortti", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: testaa, kysymys: "Mikä yksi muutos vaikutti vastaukseen, ja millä näytöllä osoitat sen?" } }
      - { id: lesson-13, kansio: "13", otsikko: "AI työparina — pohja, muokkaus ja tarkistus", tyyppi: teaching, ajattelu: { painotus: arvioi, kysymys: "Mikä luonnoksessa vaatii ihmisen korjausta tai hylkäämistä?" } }
      - { id: lesson-14, kansio: "14", otsikko: "Oma botti I — käyttäjä, tehtävä ja rajat", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: selita, kysymys: "Miten käyttäjä, tehtävä, onnistuminen ja rajat muodostavat testattavan määrittelyn?" } }
      - { id: lesson-15, kansio: "15", otsikko: "Oma botti II — tietopohja ja testisuunnitelma", tyyppi: teaching, lopputyon_askel: "*", ajattelu: { painotus: testaa, kysymys: "Mitä tietopohja kattaa, mitä se ei kata ja millä testillä osoitat eron?" } }
      - { id: lesson-16, kansio: "16", otsikko: "Oma botti III — toteutustapa, erikoistyökalut ja käyttöönotto", tyyppi: teaching, ajattelu: { painotus: perustele, kysymys: "Mikä on yksinkertaisin riittävä toteutustapa, ja millä näytöllä voit perustella valintasi?" } }
      - { id: lesson-17, kansio: "17", otsikko: "Oma apuri-botti — toteuta ensimmäinen versio", tyyppi: teaching, ajattelu: { painotus: testaa, kysymys: "Mitä kolme ensimmäistä testiä paljastavat botin ohjeista, tietopohjasta tai rajoista?" } }
      - { id: lesson-18, kansio: "18", otsikko: "Oma apuri-botti — viimeistele ja esittele", tyyppi: assessment, ajattelu: { painotus: perustele, kysymys: "Mitä yksi korjaus ja uudelleentesti kertovat vaikutuksesta tässä testissä — ja mitä ne eivät vielä osoita?" } }
  - id: osp3
    slug: agentit
    otsikko: "Agentit"
    alaotsikko: "Tekoälyagentit ja automaatio"
    vari: "var(--teal)"
    ikoni: "🤖"
    lopputyo: lopputyot/agentit.md
    ajattelukaari:
      tunnista: "Ongelma ja autonomia"
      selita: "Muisti, työnkulku ja turva"
      testaa: "Pää-, reuna- ja turvallisuustapaukset"
      arvioi: "Riskit, lokit ja ihmisen rooli"
      perustele: "Arkkitehtuuri ja parannukset"
    tunnit:
      - { id: lesson-19, kansio: "19", otsikko: "Boteista agentteihin — kielimalli ja ohjauskehys yhdessä", tyyppi: teaching, ajattelu: { painotus: tunnista, kysymys: "Mikä tekee järjestelmästä agentin eikä chatbotia tai tavallista työnkulkua?" } }
      - { id: lesson-20, kansio: "20", otsikko: "Automaatio vai autonomia? — milloin agentti kannattaa", tyyppi: teaching, lopputyon_askel: "Agentti: Ongelma", ajattelu: { painotus: arvioi, kysymys: "Mikä ehdokkaista tarvitsee agentin eikä ratkea luotettavammin promptilla tai työnkululla?" } }
      - { id: lesson-21, kansio: "21", otsikko: "Agentin muisti ja konteksti — miten kone pysyy kartalla", tyyppi: teaching, lopputyon_askel: "Agentti: Muisti", ajattelu: { painotus: selita, kysymys: "Mitä agentin pitää muistaa nyt ja mitä myöhemmin?" } }
      - { id: lesson-22, kansio: "22", otsikko: "Agentin työkalut — tieto, haku ja rajatut toiminnot", tyyppi: teaching, ajattelu: { painotus: perustele, kysymys: "Mitä tietoa tai toimintoa agentti tarvitsee, millä oikeuksilla ja miksi?" } }
      - { id: lesson-23, kansio: "23", otsikko: "Suunnittelumallit — ReAct ja eksplisiittinen työnkulku", tyyppi: teaching, lopputyon_askel: "Agentti: Päättely", ajattelu: { painotus: selita, kysymys: "Miten päätös, työkalukutsu, havainto ja seuraava toiminto näkyvät lokissa?" } }
      - { id: lesson-24, kansio: "24", otsikko: "Turvallisuus ensin — hyökkäykset, suojaukset ja lokitus", tyyppi: teaching, lopputyon_askel: "Agentti: Turva", ajattelu: { painotus: testaa, kysymys: "Millä hyökkäys- tai virhetilanteella testaat turvakerroksen toiminnan?" } }
      - { id: lesson-25, kansio: "25", otsikko: "Ihminen portinvartijana — ihmisen osallistuminen käytännössä", tyyppi: teaching, lopputyon_askel: "Agentti: Ihminen", ajattelu: { painotus: perustele, kysymys: "Missä ihmisen hyväksyntää tarvitaan — jos missään — ja mitä tapahtuu, jos hyväksyntäpyyntöön ei vastata?" } }
      - { id: lesson-26, kansio: "26", otsikko: "Kädet saveen — tee agentista testattava minimiversio", tyyppi: teaching, ajattelu: { painotus: testaa, kysymys: "Muuttuuko agentin valitsema toiminto tilanteen mukana, ja mitä toteutuspolkusi näyttö osoittaa?" } }
      - { id: lesson-27, kansio: "27", otsikko: "Viimeistele ja esittele — agenttisi on valmis", tyyppi: assessment, ajattelu: { painotus: perustele, kysymys: "Mitä testit, korjaukset ja toteutuspolun näyttö osoittavat — ja mitä ne eivät osoita?" } }
