<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">

</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Päätä kriteerit ennen tuottamista</text><text x="74" y="132" font-size="19" fill="#5A6478">Muuten arvio mukautuu helposti siihen, mitä ensimmäinen versio sattui tekemään.</text><rect x="74" y="178" width="812" height="234" rx="18" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="222" font-size="18" font-weight="800" fill="#6A309D">KOLME KYSYMYSTÄ</text><g font-size="20" fill="#1B2336"><text x="104" y="272">1. Mihin ja kenelle tuotos tehdään?</text><text x="104" y="322">2. Mitä tuotoksessa pitää havaittavasti olla?</text><text x="104" y="372">3. Mikä tekisi tuotoksesta käyttökelvottoman?</text></g><rect x="74" y="438" width="812" height="46" rx="11" fill="#FFF7E2"/><text x="104" y="468" font-size="17" font-weight="700" fill="#8A6A00">”Hieno” ei ole vielä arviointikriteeri.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Arvioi tuotosta sen omilla ehdoilla</text><g font-size="17" fill="#3A4253"><rect x="74" y="154" width="392" height="116" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="100" y="190" font-size="20" font-weight="800" fill="#6A309D">KUVA</text><text x="100" y="224">oikeellisuus · sommittelu · saavutettavuus</text><rect x="494" y="154" width="392" height="116" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="520" y="190" font-size="20" font-weight="800" fill="#006B7A">ÄÄNI</text><text x="520" y="224">selkeys · rakenne · kuunteluympäristö</text><rect x="74" y="298" width="392" height="116" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="100" y="334" font-size="20" font-weight="800" fill="#8A6A00">VIDEO</text><text x="100" y="368">jatkuvuus · viesti · tekstitys</text><rect x="494" y="298" width="392" height="116" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="520" y="334" font-size="20" font-weight="800" fill="#247A52">KOODI</text><text x="520" y="368">testitulokset · virhetilanteet · ymmärrettävyys</text></g><text x="74" y="464" font-size="18" font-weight="700" fill="#1B2336">Kriteeri on hyvä, kun toinenkin ihminen voi tarkistaa sen.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Koodi vaatii ajettavan näytön</text><text x="74" y="132" font-size="19" fill="#5A6478">Toimivalta näyttävä koodi ei vielä osoita, että ohjelma toimii.</text><rect x="74" y="176" width="812" height="208" rx="18" fill="#1B2336"/><g font-size="18" font-family="ui-monospace,monospace"><text x="108" y="224" fill="#D9C3EC">testi 1</text><text x="246" y="224" fill="#FFFFFF">tavallinen syöte → odotettu tulos</text><text x="108" y="274" fill="#D9C3EC">testi 2</text><text x="246" y="274" fill="#FFFFFF">toinen sallittu syöte → odotettu tulos</text><text x="108" y="324" fill="#D9C3EC">testi 3</text><text x="246" y="324" fill="#FFFFFF">virheellinen syöte → hallittu virhe</text></g><rect x="74" y="416" width="812" height="66" rx="12" fill="#F0F9F4"/><text x="104" y="445" font-size="18" font-weight="700" fill="#247A52">Osaatko selittää, miksi koodi tuottaa nämä tulokset?</text><text x="104" y="470" font-size="16" fill="#3A4253">Ymmärtäminen ja testit kuuluvat samaan arviointiin.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Laatu ei vielä ratkaise vastuullisuutta</text><text x="74" y="132" font-size="19" fill="#5A6478">Tee erillinen käyttöönottotarkistus.</text><g font-size="18" fill="#3A4253"><circle cx="104" cy="202" r="8" fill="#C79100"/><text x="130" y="209">Saanko käyttää lähdeaineistoa ja valmista tuotosta?</text><circle cx="104" cy="258" r="8" fill="#C79100"/><text x="130" y="265">Voiko tuotos johtaa yleisöä harhaan?</text><circle cx="104" cy="314" r="8" fill="#C79100"/><text x="130" y="321">Onko mukana henkilötietoja tai tunnistettavia ihmisiä?</text><circle cx="104" cy="370" r="8" fill="#C79100"/><text x="130" y="377">Onko tuotos saavutettava käyttötarkoituksessaan?</text><circle cx="104" cy="426" r="8" fill="#C79100"/><text x="130" y="433">Miten tekoälyn käytöstä kerrotaan avoimesti?</text></g><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text>
</svg></div>
