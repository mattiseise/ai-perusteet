<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#fff"/><text x="74" y="96" font-size="38" font-weight="800" fill="#1B2336">Ihmisen valvonta ei ole kumileimasin</text><text x="94" y="182" font-size="21" fill="#1B2336">Valvoja tuntee järjestelmän rajat.</text><text x="94" y="244" font-size="21" fill="#1B2336">Hän näkee päätöksen kannalta olennaiset tiedot.</text><text x="94" y="306" font-size="21" fill="#1B2336">Hän voi poiketa ehdotuksesta ja keskeyttää käytön.</text><text x="94" y="368" font-size="21" fill="#1B2336">Päätöksen kohde voi pyytää oikaisua.</text><rect x="74" y="414" width="812" height="55" rx="12" fill="#EEF1FE"/><text x="100" y="449" font-size="18" font-weight="700" fill="#2F46B0">Valvonta tarvitsee osaamista, aikaa, tietoa ja valtaa.</text><text x="893" y="512" text-anchor="end" font-size="14" fill="#9AA6BD">9 / 11</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#fff"/><text x="74" y="96" font-size="38" font-weight="800" fill="#1B2336">Lähdekortti tuntia 9 varten</text><rect x="74" y="150" width="812" height="260" rx="18" fill="#EEF1FE"/><text x="104" y="203" font-size="21" font-weight="800" fill="#2F46B0">Valitse skenaario ja kaksi lähdettä.</text><text x="104" y="252" font-size="19" fill="#3A4253">Mitä väitettä lähde tukee?</text><text x="104" y="292" font-size="19" fill="#3A4253">Kuka julkaisi tiedon ja milloin tarkistit sen?</text><text x="104" y="332" font-size="19" fill="#3A4253">Miksi lähde sopii väitteeseen — ja mitä se ei ratkaise?</text><text x="104" y="372" font-size="19" fill="#3A4253">Tukevatko lähteet yhdessä vähintään kahta keskeistä väitettä?</text><text x="74" y="452" font-size="19" font-weight="700" fill="#A35A22">Tunnilla 9 enintään yksi uusi lähdetarkistus.</text><text x="893" y="512" text-anchor="end" font-size="14" fill="#9AA6BD">10 / 11</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#fff"/><rect x="0" width="12" height="540" fill="#3B5BDB"/><text x="74" y="96" font-size="38" font-weight="800" fill="#1B2336">Vastuullisen käyttöönoton muistilista</text><text x="94" y="176" font-size="21" fill="#1B2336">Tarkista datan edustavuus ja ryhmäkohtaiset tulokset.</text><text x="94" y="236" font-size="21" fill="#1B2336">Tunnista käyttötarkoitus, riskit ja toimijaroolit.</text><text x="94" y="296" font-size="21" fill="#1B2336">Kerro ihmisille tekoälyn käytöstä tarvittavalla tavalla.</text><text x="94" y="356" font-size="21" fill="#1B2336">Järjestä todellinen valvonta, oikaisu ja seuranta.</text><text x="74" y="435" font-size="19" font-weight="700" fill="#2F46B0">Tarkista säädöksen ajantasainen tilanne virallisista lähteistä.</text><text x="893" y="512" text-anchor="end" font-size="14" fill="#9AA6BD">11 / 11</text></svg></div>
