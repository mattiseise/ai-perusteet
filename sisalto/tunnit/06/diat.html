<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#2F46B0"/><text x="74" y="92" font-size="15" letter-spacing="3" fill="#7E88A8" font-family="ui-monospace,monospace">01 · TEORIA · OPPITUNTI 06</text><text x="74" y="230" font-size="49" font-weight="800" fill="#1B2336">Kuvat, ääni ja teksti</text><text x="74" y="286" font-size="27" fill="#5A6478">Kun sanat eivät riitä — ja kun ne riittävät.</text><rect x="74" y="350" width="812" height="74" rx="15" fill="#EEF1FF" stroke="#C9D0F4" stroke-width="2"/><text x="104" y="380" font-size="18" font-weight="700" fill="#2F46B0">Valitse aineistomuoto sen perusteella, mitä mallin pitää havaita.</text><text x="104" y="407" font-size="17" fill="#3A4253">Enemmän aineistoa ei automaattisesti tarkoita parempaa vastausta.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">1 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Aloita tehtävästä, älä tiedostosta</text><text x="74" y="132" font-size="19" fill="#5A6478">Mitä mallin pitää nähdä, kuulla tai lukea?</text><g font-size="18" text-anchor="middle"><rect x="74" y="200" width="180" height="82" rx="14" fill="#FFFFFF" stroke="#C9D0F4" stroke-width="2"/><text x="164" y="250" fill="#1B2336" font-weight="700">TEHTÄVÄ</text><path d="M268 241 H338" stroke="#9AA6BD" stroke-width="3"/><path d="M338 241 l-12 -7 v14 z" fill="#9AA6BD"/><rect x="352" y="200" width="254" height="82" rx="14" fill="#FFFFFF" stroke="#C9D0F4" stroke-width="2"/><text x="479" y="250" fill="#1B2336" font-weight="700">TARVITTAVA HAVAINTO</text><path d="M620 241 H690" stroke="#9AA6BD" stroke-width="3"/><path d="M690 241 l-12 -7 v14 z" fill="#9AA6BD"/><rect x="704" y="200" width="182" height="82" rx="14" fill="#EEF1FF" stroke="#2F46B0" stroke-width="2"/><text x="795" y="250" fill="#2F46B0" font-weight="700">MUOTO</text></g><rect x="74" y="342" width="812" height="86" rx="14" fill="#FFFFFF" stroke="#D8DEEC"/><text x="104" y="378" font-size="18" fill="#3A4253">Esimerkki: tarkka laskenta tarvitsee alkuperäiset arvot.</text><text x="104" y="407" font-size="18" fill="#3A4253">Kaavion kuva voi auttaa kehityssuunnan hahmottamisessa.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">2 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Eri muodot säilyttävät eri tietoa</text><g font-size="17" fill="#3A4253"><rect x="74" y="150" width="250" height="126" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="100" y="188" font-size="21" font-weight="800" fill="#2F46B0">TEKSTI</text><text x="100" y="222">sanamuoto · nimet · luvut</text><text x="100" y="250">muokkaaminen ja hakeminen</text><rect x="355" y="150" width="250" height="126" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="381" y="188" font-size="21" font-weight="800" fill="#2F46B0">KUVA</text><text x="381" y="222">sijainti · muodot · värit</text><text x="381" y="250">näkyvä kokonaisuus</text><rect x="636" y="150" width="250" height="126" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="662" y="188" font-size="21" font-weight="800" fill="#2F46B0">TAULUKKO</text><text x="662" y="222">rivit · sarakkeet · arvot</text><text x="662" y="250">laskenta ja vertailu</text><rect x="214" y="310" width="250" height="126" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="240" y="348" font-size="21" font-weight="800" fill="#2F46B0">ÄÄNI</text><text x="240" y="382">puhe · tauot · ajallinen kulku</text><text x="240" y="410">ei varma tunnetilan mittari</text><rect x="495" y="310" width="250" height="126" rx="15" fill="#EEF1FF" stroke="#C9D0F4"/><text x="521" y="348" font-size="21" font-weight="800" fill="#2F46B0">DOKUMENTTI</text><text x="521" y="382">pitkä rakenne · lähdeyhteys</text><text x="521" y="410">vaatii kohdan rajaamista</text></g><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Yhdistä vain tarkoituksella</text><text x="74" y="132" font-size="19" fill="#5A6478">Jokaisella aineistolla pitää olla nimetty tehtävä.</text><rect x="74" y="180" width="812" height="206" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="226" font-size="18" font-weight="800" fill="#2F46B0">PÄÄTÖS: Miten myynti muuttui ja mikä oli suurin kuukausiero?</text><line x1="104" y1="250" x2="856" y2="250" stroke="#E1E5EF"/><text x="104" y="292" font-size="19" fill="#1B2336">Kaavio</text><text x="250" y="292" font-size="18" fill="#5A6478">näyttää kehityksen nopeasti</text><text x="104" y="336" font-size="19" fill="#1B2336">Taulukko</text><text x="250" y="336" font-size="18" fill="#5A6478">antaa tarkat arvot laskentaan</text><rect x="74" y="414" width="812" height="58" rx="12" fill="#FFF7E2"/><text x="104" y="450" font-size="18" font-weight="700" fill="#8A6A00">Tarpeeton liite tuo kohinaa, ei automaattisesti kontekstia.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">4 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Vertaa hallitusti</text><text x="74" y="132" font-size="19" fill="#5A6478">Kokeen tarkoitus on löytää ero, ei kruunata yleistä voittajaa.</text><g font-size="18"><rect x="104" y="178" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="215" fill="#1B2336">1. Sama tehtävä ja sama tavoiteltu vastausmuoto</text><rect x="104" y="250" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="287" fill="#1B2336">2. Muuta vain aineistomuotoa</text><rect x="104" y="322" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="359" fill="#1B2336">3. Arvioi samoilla ennalta päätetyillä kriteereillä</text><rect x="104" y="394" width="752" height="58" rx="12" fill="#EEF1FF" stroke="#2F46B0"/><text x="134" y="431" fill="#2F46B0" font-weight="700">4. Rajaa johtopäätös juuri tähän tehtävään</text></g><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Turvallisuus on lähetysportti</text><text x="74" y="132" font-size="19" fill="#5A6478">Ratkaise nämä ennen kuin aineisto siirtyy palveluun.</text><g font-size="18" fill="#3A4253"><circle cx="102" cy="202" r="8" fill="#C79100"/><text x="128" y="209">Onko aineiston käyttö sallittu?</text><circle cx="102" cy="258" r="8" fill="#C79100"/><text x="128" y="265">Näkyykö nimiä, kasvoja, salaisuuksia tai sivullisten puhetta?</text><circle cx="102" cy="314" r="8" fill="#C79100"/><text x="128" y="321">Voiko mukaan rajata vain tehtävässä tarvittavan kohdan?</text><circle cx="102" cy="370" r="8" fill="#C79100"/><text x="128" y="377">Onko palvelu hyväksytty juuri tälle aineistolle?</text></g><rect x="74" y="420" width="812" height="62" rx="12" fill="#FFF0EC" stroke="#F0A38C"/><text x="104" y="458" font-size="18" font-weight="700" fill="#A43B25">Jos porttiehto ei täyty, aineistoa ei lähetetä.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Malli voi havaita väärin</text><text x="74" y="132" font-size="19" fill="#5A6478">Sujuva vastaus ei ole todiste aineistosta.</text><rect x="74" y="178" width="812" height="210" rx="18" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><g font-size="18" fill="#3A4253"><text x="108" y="226">• pieni teksti voi tulkkiutua väärin</text><text x="108" y="270">• kaavion sarjat tai asteikko voivat sekoittua</text><text x="108" y="314">• nimi voi litteroitua virheellisesti</text><text x="108" y="358">• osa kuvasta tai dokumentista voi jäädä huomiotta</text></g><rect x="74" y="418" width="812" height="64" rx="12" fill="#EEF1FF"/><text x="104" y="447" font-size="18" font-weight="700" fill="#2F46B0">Pyydä kohta, rivi tai aikaleima — ja tarkista se alkuperäisestä.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text>
</svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
<rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#2F46B0"/><text x="74" y="98" font-size="38" font-weight="800" fill="#1B2336">Tunnin päätösmalli</text><g font-size="18"><rect x="74" y="154" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="190" fill="#1B2336">1. Mitä mallin pitää havaita?</text><rect x="74" y="224" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="260" fill="#1B2336">2. Mikä muoto säilyttää juuri sen tiedon?</text><rect x="74" y="294" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="330" fill="#1B2336">3. Mikä on pienin turvallinen aineisto?</text><rect x="74" y="364" width="812" height="56" rx="12" fill="#EEF1FF" stroke="#2F46B0"/><text x="104" y="400" fill="#2F46B0" font-weight="700">4. Miten tarkistan tulkinnan alkuperäisestä?</text></g><text x="74" y="466" font-size="20" font-weight="800" fill="#1B2336">Mitä tietoa menetät, jos vaihdat aineiston muotoa?</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">8 / 8</text>
</svg></div>
