<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="92" font-size="15" letter-spacing="3" fill="#7E88A8">02 · TEKOÄLYJEN KÄYTTÖ · OPPITUNTI 12</text><text x="74" y="230" font-size="49" font-weight="800" fill="#1B2336">Rakenna promptikortti</text><text x="74" y="288" font-size="27" fill="#5A6478">Yksi toistuva tehtävä · kaksi versiota · yksi muutos</text><rect x="74" y="350" width="812" height="74" rx="15" fill="#F4EFFC" stroke="#D9C3EC" stroke-width="2"/><text x="104" y="380" font-size="18" font-weight="700" fill="#6A309D">Hyvä prompti ei vain kuulosta hyvältä — sen vaikutus osoitetaan.</text><text x="104" y="407" font-size="17" fill="#3A4253">Tallenna myös käyttötilanne, kriteerit ja tunnettu raja.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">1 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Valitse tehtävä, jonka osaat arvioida</text><text x="74" y="132" font-size="19" fill="#5A6478">Kortti on tarkoitettu toistuvaan tehtävään, ei kaikkiin tilanteisiin.</text><rect x="74" y="178" width="812" height="190" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="224" font-size="18" font-weight="800" fill="#6A309D">TÄYDENNÄ YHDELLÄ LAUSEELLA</text><text x="104" y="278" font-size="21" fill="#1B2336">Muunnan [vaihtuvan aineiston] muotoon [haluttu tuotos],</text><text x="104" y="316" font-size="21" fill="#1B2336">jotta [käyttäjä] voi [käyttötarkoitus].</text><rect x="74" y="402" width="812" height="60" rx="12" fill="#FFF7E2"/><text x="104" y="439" font-size="18" font-weight="700" fill="#8A6A00">Jos et tunnista hyvää lopputulosta, et voi osoittaa parannusta.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">2 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Erota pysyvä ohje ja vaihtuva syöte</text><rect x="74" y="160" width="380" height="250" rx="18" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="104" y="202" font-size="22" font-weight="800" fill="#6A309D">PYSYVÄ OHJE</text><g font-size="18" fill="#3A4253"><text x="104" y="250">• tehtävä ja käyttäjä</text><text x="104" y="292">• työvaiheet ja muoto</text><text x="104" y="334">• rajat ja kriteerit</text></g><rect x="506" y="160" width="380" height="250" rx="18" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><text x="536" y="202" font-size="22" font-weight="800" fill="#1B2336">VAIHTUVA SYÖTE</text><g font-size="18" fill="#3A4253"><text x="536" y="250">• uusi lähdeaineisto</text><text x="536" y="292">• vaihtuva yleisö tarvittaessa</text><text x="536" y="334">• käyttökerran rajaukset</text></g><text x="74" y="460" font-size="18" font-weight="700" fill="#1B2336">Merkitse vaihdettavat kohdat selvästi: [LÄHDEAINEISTO].</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Päätä kriteerit ennen ajoa</text><text x="74" y="132" font-size="19" fill="#5A6478">”Parempi” muutetaan ominaisuudeksi, jonka voi tarkistaa.</text><rect x="74" y="172" width="812" height="230" rx="16" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><line x1="430" y1="172" x2="430" y2="402" stroke="#D8DEEC"/><text x="104" y="214" font-size="17" font-weight="800" fill="#A43B25">EPÄMÄÄRÄINEN</text><text x="460" y="214" font-size="17" font-weight="800" fill="#247A52">HAVAITTAVA</text><text x="104" y="266" font-size="19" fill="#3A4253">”Teksti on selkeä.”</text><text x="460" y="266" font-size="18" fill="#3A4253">Jokainen kohta alkaa verbillä.</text><text x="104" y="322" font-size="19" fill="#3A4253">”Malli käytti lähdettä hyvin.”</text><text x="460" y="322" font-size="18" fill="#3A4253">Nimiä ja lukuja ei lisätä.</text><text x="104" y="378" font-size="19" fill="#3A4253">”Muoto toimii.”</text><text x="460" y="378" font-size="18" fill="#3A4253">Tulos siirtyy ilman rakennemuutosta.</text><rect x="74" y="430" width="812" height="52" rx="12" fill="#F4EFFC"/><text x="104" y="463" font-size="18" font-weight="700" fill="#6A309D">Toisenkin ihmisen pitää voida tarkistaa kriteeri.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">4 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Muuta vain yhtä asiaa</text><g font-size="18" text-anchor="middle"><rect x="74" y="184" width="260" height="150" rx="16" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><text x="204" y="232" font-size="22" font-weight="800" fill="#1B2336">VERSIO 1</text><text x="204" y="276" fill="#5A6478">sama tehtävä ja syöte</text><path d="M352 259 H430" stroke="#9AA6BD" stroke-width="3"/><path d="M430 259 l-12 -7 v14 z" fill="#9AA6BD"/><rect x="448" y="184" width="172" height="150" rx="16" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="534" y="232" font-size="18" font-weight="800" fill="#6A309D">YKSI MUUTOS</text><text x="534" y="276" fill="#5A6478">kirjaa se</text><path d="M638 259 H716" stroke="#9AA6BD" stroke-width="3"/><path d="M716 259 l-12 -7 v14 z" fill="#9AA6BD"/><rect x="734" y="184" width="152" height="150" rx="16" fill="#F0F9F4" stroke="#2F9E69" stroke-width="2"/><text x="810" y="232" font-size="22" font-weight="800" fill="#247A52">VERSIO 2</text><text x="810" y="276" fill="#5A6478">samat kriteerit</text></g><rect x="74" y="384" width="812" height="72" rx="12" fill="#FFF7E2"/><text x="104" y="414" font-size="18" font-weight="700" fill="#8A6A00">Uusi keskustelu estää aiempaa vastausta sekoittamasta vertailua.</text><text x="104" y="442" font-size="17" fill="#3A4253">Jos myös aineisto vaihtuu, muutoksen vaikutus jää epäselväksi.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Kirjaa vaikutus havaintona</text><rect x="74" y="164" width="812" height="252" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="208" font-size="18" font-weight="800" fill="#6A309D">MUUTOS</text><text x="264" y="208" font-size="18" fill="#1B2336">Lisäsin ohjeen: älä keksi puuttuvia määräaikoja.</text><text x="104" y="270" font-size="18" font-weight="800" fill="#6A309D">TULOS</text><text x="264" y="270" font-size="18" fill="#1B2336">Versio 2 merkitsi puuttuvat tiedot avoimiksi.</text><text x="104" y="332" font-size="18" font-weight="800" fill="#6A309D">NÄYTTÖ</text><text x="264" y="332" font-size="18" fill="#1B2336">Versio 1 keksi kaksi määräaikaa; versio 2 ei yhtään.</text><text x="104" y="394" font-size="18" font-weight="800" fill="#6A309D">RAJAUS</text><text x="264" y="394" font-size="18" fill="#1B2336">Päätelmä koskee tätä tehtävää ja aineistoa.</text><text x="74" y="462" font-size="18" font-weight="700" fill="#1B2336">Vaikutelma muuttuu päätelmäksi vasta, kun näyttö on nimetty.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Kortti kertoo myös rajansa</text><text x="74" y="132" font-size="19" fill="#5A6478">Toimiva rakenne voi olla väärä väline toisessa tilanteessa.</text><g font-size="18" fill="#3A4253"><circle cx="104" cy="206" r="8" fill="#C79100"/><text x="130" y="213">Aineistoa ei saa lähettää käytettävään palveluun.</text><circle cx="104" cy="266" r="8" fill="#C79100"/><text x="130" y="273">Tehtävä vaatii asiantuntijan päätöksen.</text><circle cx="104" cy="326" r="8" fill="#C79100"/><text x="130" y="333">Syöte poikkeaa siitä, millä korttia on testattu.</text><circle cx="104" cy="386" r="8" fill="#C79100"/><text x="130" y="393">Lähde on puutteellinen tai ristiriitainen.</text></g><rect x="74" y="430" width="812" height="52" rx="12" fill="#F4EFFC"/><text x="104" y="463" font-size="18" font-weight="700" fill="#6A309D">Tunnettu raja estää väärän varmuuden.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="98" font-size="38" font-weight="800" fill="#1B2336">Promptikortin valmis paketti</text><g font-size="18"><rect x="74" y="150" width="812" height="54" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="184" fill="#1B2336">1. Käyttötilanne ja vaihtuvan syötteen paikka</text><rect x="74" y="218" width="812" height="54" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="252" fill="#1B2336">2. Promptin versiot 1 ja 2 sekä molemmat vastaukset</text><rect x="74" y="286" width="812" height="54" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="320" fill="#1B2336">3. Ennalta päätetyt laatukriteerit</text><rect x="74" y="354" width="812" height="54" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="104" y="388" fill="#6A309D" font-weight="700">4. Nimetyn muutoksen vaikutus ja tunnettu raja</text></g><text x="74" y="458" font-size="20" font-weight="800" fill="#1B2336">Yksi testattu kortti on rakennuspalikka 1.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">8 / 8</text></svg></div>
