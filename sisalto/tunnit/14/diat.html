<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="92" font-size="15" letter-spacing="3" fill="#7E88A8">02 · TEKOÄLYJEN KÄYTTÖ · OPPITUNTI 14</text><text x="74" y="230" font-size="50" font-weight="800" fill="#1B2336">Oma botti I</text><text x="74" y="288" font-size="27" fill="#5A6478">Käyttäjä, tehtävä, onnistuminen ja rajat</text><rect x="74" y="350" width="812" height="74" rx="15" fill="#F4EFFC" stroke="#D9C3EC" stroke-width="2"/><text x="104" y="380" font-size="18" font-weight="700" fill="#6A309D">Tällä tunnilla suunnitellaan. Botti rakennetaan vasta tunnilla 17.</text><text x="104" y="407" font-size="17" fill="#3A4253">Määrittely kertoo, mitä myöhemmän toteutuksen pitää saada aikaan.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">1 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Aloita käyttäjän tilanteesta</text><text x="74" y="132" font-size="19" fill="#5A6478">”Kaikille kaikkea” ei ole käyttötapaus.</text><rect x="74" y="174" width="812" height="216" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="222" font-size="18" font-weight="800" fill="#6A309D">KIRJOITA YHDELLÄ VIRKKEELLÄ</text><text x="104" y="280" font-size="22" fill="#1B2336">[Käyttäjä] tarvitsee apua [tehtävässä],</text><text x="104" y="322" font-size="22" fill="#1B2336">jotta hän voi [saavutettava lopputulos].</text><rect x="74" y="422" width="812" height="60" rx="12" fill="#FFF7E2"/><text x="104" y="459" font-size="18" font-weight="700" fill="#8A6A00">Nimi, persoona tai alusta ei korvaa todellista käyttäjän tarvetta.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">2 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Tee onnistumisesta havaittava</text><rect x="74" y="156" width="380" height="230" rx="18" fill="#FFF0EC" stroke="#D86A4C" stroke-width="2"/><text x="104" y="202" font-size="20" font-weight="800" fill="#A43B25">LIIAN YLEINEN</text><text x="104" y="260" font-size="21" fill="#3A1408">”Botti auttaa käyttäjää.”</text><text x="104" y="326" font-size="17" fill="#5A6478">Mitä käyttäjä sai aikaan?</text><rect x="506" y="156" width="380" height="230" rx="18" fill="#F0F9F4" stroke="#2F9E69" stroke-width="2"/><text x="536" y="202" font-size="20" font-weight="800" fill="#247A52">HAVAITTAVA</text><text x="536" y="252" font-size="19" fill="#173A28">”Käyttäjä löytää oikean</text><text x="536" y="284" font-size="19" fill="#173A28">harjoitusajan ja seuraavan</text><text x="536" y="316" font-size="19" fill="#173A28">liittymisvaiheen.”</text><text x="74" y="446" font-size="18" font-weight="700" fill="#1B2336">Onnistuminen toimii myöhemmin testin vertailukohtana.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Kuvaa käyttäjän eteneminen</text><text x="74" y="132" font-size="19" fill="#5A6478">Työnkulku kertoo keskustelun logiikan, ei käyttöliittymän painikkeita.</text><g font-size="17" text-anchor="middle"><rect x="74" y="206" width="150" height="70" rx="14" fill="#FFFFFF" stroke="#D8DEEC"/><text x="149" y="248" fill="#1B2336">1 · tavoite</text><path d="M238 241 H276" stroke="#9AA6BD" stroke-width="3"/><path d="M276 241 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="290" y="206" width="150" height="70" rx="14" fill="#FFFFFF" stroke="#D8DEEC"/><text x="365" y="248" fill="#1B2336">2 · lähtötilanne</text><path d="M454 241 H492" stroke="#9AA6BD" stroke-width="3"/><path d="M492 241 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="506" y="206" width="150" height="70" rx="14" fill="#FFFFFF" stroke="#D8DEEC"/><text x="581" y="248" fill="#1B2336">3 · ohjaus</text><path d="M670 241 H708" stroke="#9AA6BD" stroke-width="3"/><path d="M708 241 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="722" y="206" width="164" height="70" rx="14" fill="#F4EFFC" stroke="#863FC4"/><text x="804" y="248" fill="#6A309D">4 · seuraava askel</text></g><rect x="154" y="344" width="652" height="72" rx="12" fill="#FFFFFF" stroke="#D8DEEC"/><text x="480" y="374" text-anchor="middle" font-size="18" font-weight="700" fill="#1B2336">Hyvä työnkulku sallii tarkentavan kysymyksen.</text><text x="480" y="401" text-anchor="middle" font-size="17" fill="#5A6478">Se ei pakota käyttäjää yhteen jäykkään polkuun.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">4 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Rooli kertoo tehtävän, sävy tavan</text><rect x="74" y="166" width="380" height="220" rx="18" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="104" y="210" font-size="22" font-weight="800" fill="#6A309D">ROOLI</text><text x="104" y="260" font-size="19" fill="#1B2336">Millaista tehtävää botti hoitaa?</text><text x="104" y="306" font-size="17" fill="#5A6478">Esimerkiksi perehdyttäjä, joka</text><text x="104" y="334" font-size="17" fill="#5A6478">käyttää vain hyväksyttyjä ohjeita.</text><rect x="506" y="166" width="380" height="220" rx="18" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><text x="536" y="210" font-size="22" font-weight="800" fill="#1B2336">ÄÄNENSÄVY</text><text x="536" y="260" font-size="19" fill="#1B2336">Miten botti puhuu käyttäjälle?</text><text x="536" y="306" font-size="17" fill="#5A6478">Selkeä, rauhallinen ja</text><text x="536" y="334" font-size="17" fill="#5A6478">kohderyhmälle sopiva.</text><rect x="74" y="422" width="812" height="58" rx="12" fill="#FFF7E2"/><text x="104" y="458" font-size="18" font-weight="700" fill="#8A6A00">Ystävällinen persoona ei korvaa täsmällistä tehtävää ja vastuuta.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Raja kertoo myös jatkotoimen</text><text x="74" y="132" font-size="19" fill="#5A6478">”Toimi vastuullisesti” ei vielä ohjaa poikkeustilannetta.</text><rect x="74" y="172" width="812" height="222" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><g font-size="19" fill="#1B2336"><text x="104" y="222">EHTO</text><text x="260" y="222" fill="#5A6478">Vastausta ei löydy hyväksytystä aineistosta.</text><text x="104" y="286">TOIMINTA</text><text x="260" y="286" fill="#5A6478">Botti kertoo puutteen eikä arvaa.</text><text x="104" y="350">VASTUU</text><text x="260" y="350" fill="#5A6478">Botti ohjaa nimetylle ihmiselle tai lähteelle.</text></g><rect x="74" y="426" width="812" height="56" rx="12" fill="#F0F9F4"/><text x="104" y="461" font-size="18" font-weight="700" fill="#247A52">Hyvä raja on toteutettava ja myöhemmin testattava.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Haasta suunnitelma, älä ulkoista sitä</text><text x="74" y="132" font-size="19" fill="#5A6478">Tekoäly voi auttaa löytämään aukon ennen toteutusta.</text><g font-size="18"><rect x="104" y="178" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="215" fill="#1B2336">Onko käyttäjä ja hänen tilanteensa tarpeeksi tarkka?</text><rect x="104" y="250" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="287" fill="#1B2336">Voiko onnistumisen havaita?</text><rect x="104" y="322" width="752" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="134" y="359" fill="#1B2336">Puuttuuko työnkulusta tyypillinen vaihe?</text><rect x="104" y="394" width="752" height="58" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="134" y="431" fill="#6A309D" font-weight="700">Mikä raja on liian löysä, tiukka tai epäselvä?</text></g><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="98" font-size="38" font-weight="800" fill="#1B2336">Määrittelydokumentti on rakennuspalikka 2</text><g font-size="18"><rect x="74" y="150" width="812" height="52" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="183" fill="#1B2336">Käyttäjä ja rajattu tehtävä</text><rect x="74" y="216" width="812" height="52" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="249" fill="#1B2336">Havaittava onnistuminen</text><rect x="74" y="282" width="812" height="52" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="315" fill="#1B2336">Työnkulku, rooli ja äänensävy</text><rect x="74" y="348" width="812" height="52" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="104" y="381" fill="#6A309D" font-weight="700">Rajat: ehto, toiminta ja vastuun siirtyminen</text></g><text x="74" y="450" font-size="20" font-weight="800" fill="#1B2336">Ei vielä järjestelmäpromptia. Ei vielä botin testiä.</text><text x="74" y="480" font-size="17" fill="#5A6478">Seuraavaksi suunnittelet tietopohjan ja testit.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">8 / 8</text></svg></div>
