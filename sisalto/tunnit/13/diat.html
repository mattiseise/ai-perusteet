<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="92" font-size="15" letter-spacing="3" fill="#7E88A8">02 · TEKOÄLYJEN KÄYTTÖ · OPPITUNTI 13</text><text x="74" y="230" font-size="50" font-weight="800" fill="#1B2336">Tekoäly työparina</text><text x="74" y="288" font-size="27" fill="#5A6478">Pohja, muokkaus ja tarkistus</text><rect x="74" y="350" width="812" height="74" rx="15" fill="#F4EFFC" stroke="#D9C3EC" stroke-width="2"/><text x="104" y="380" font-size="18" font-weight="700" fill="#6A309D">Tekoäly ehdottaa. Ihminen tarkistaa, muokkaa ja päättää.</text><text x="104" y="407" font-size="17" fill="#3A4253">Työ näkyy versioissa ja päätöslokissa.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">1 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Työpari ei tarkoita vastuun siirtoa</text><rect x="74" y="154" width="370" height="260" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="198" font-size="22" font-weight="800" fill="#6A309D">TEKOÄLY</text><g font-size="18" fill="#3A4253"><text x="104" y="246">• ehdottaa rakennetta</text><text x="104" y="288">• tekee luonnoksen</text><text x="104" y="330">• kysyy ja haastaa</text><text x="104" y="372">• toimii testilukijana</text></g><rect x="516" y="154" width="370" height="260" rx="18" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="546" y="198" font-size="22" font-weight="800" fill="#6A309D">IHMINEN</text><g font-size="18" fill="#3A4253"><text x="546" y="246">• rajaa tehtävän</text><text x="546" y="288">• tarkistaa todellisuuden</text><text x="546" y="330">• hyväksyy tai hylkää</text><text x="546" y="372">• vastaa lopputuloksesta</text></g><text x="74" y="466" font-size="19" font-weight="700" fill="#1B2336">Nopeus tulee ehdotuksista. Laatu tulee päätöksistä.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">2 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Rajaa tehtävä ennen luonnosta</text><text x="74" y="132" font-size="19" fill="#5A6478">Muuten malli joutuu arvaamaan, mitä hyvä lopputulos tarkoittaa.</text><g font-size="18"><rect x="90" y="180" width="780" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="120" y="217" fill="#1B2336">Kuka käyttää tuotosta?</text><rect x="90" y="252" width="780" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="120" y="289" fill="#1B2336">Mitä hänen pitää saada aikaan?</text><rect x="90" y="324" width="780" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="120" y="361" fill="#1B2336">Mitkä kolme asiaa pitää olla oikein?</text><rect x="90" y="396" width="780" height="58" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="120" y="433" fill="#6A309D" font-weight="700">Mistä tarkistat nämä asiat?</text></g><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Säilytä ensimmäinen versio</text><text x="74" y="132" font-size="19" fill="#5A6478">Ilman lähtöversiota oma työ jää näkymättömäksi.</text><rect x="74" y="180" width="350" height="220" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="222" font-size="21" font-weight="800" fill="#5A6478">VERSIO 1</text><text x="104" y="264" font-size="18" fill="#3A4253">tekoälyn luonnos</text><text x="104" y="300" font-size="18" fill="#3A4253">epävarmat yksityiskohdat</text><text x="104" y="336" font-size="18" fill="#3A4253">puuttuvat vaiheet</text><path d="M448 290 H512" stroke="#9AA6BD" stroke-width="3"/><path d="M512 290 l-12 -7 v14 z" fill="#9AA6BD"/><rect x="536" y="180" width="350" height="220" rx="18" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="566" y="222" font-size="21" font-weight="800" fill="#6A309D">VERSIO 2</text><text x="566" y="264" font-size="18" fill="#3A4253">ihmisen korjaukset</text><text x="566" y="300" font-size="18" fill="#3A4253">lähteillä tarkistetut kohdat</text><text x="566" y="336" font-size="18" fill="#3A4253">kohderyhmälle sopiva rakenne</text><text x="74" y="452" font-size="18" font-weight="700" fill="#1B2336">Vertailu osoittaa, mitä ihminen muutti ja miksi.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">4 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Päätösloki tekee ajattelun näkyväksi</text><rect x="74" y="158" width="812" height="242" rx="16" fill="#FAFBFE" stroke="#D8DEEC" stroke-width="2"/><line x1="74" y1="216" x2="886" y2="216" stroke="#D8DEEC"/><line x1="284" y1="158" x2="284" y2="400" stroke="#D8DEEC"/><line x1="520" y1="158" x2="520" y2="400" stroke="#D8DEEC"/><text x="96" y="194" font-size="16" font-weight="700" fill="#5A6478">LUONNOKSEN KOHTA</text><text x="306" y="194" font-size="16" font-weight="700" fill="#5A6478">PÄÄTÖS</text><text x="542" y="194" font-size="16" font-weight="700" fill="#5A6478">PERUSTELU JA LÄHDE</text><text x="96" y="260" font-size="17" fill="#1B2336">toimiva vaihe</text><text x="306" y="260" font-size="17" fill="#247A52">säilytä</text><text x="542" y="260" font-size="17" fill="#3A4253">vastaa todellista työnkulkua</text><text x="96" y="316" font-size="17" fill="#1B2336">epätarkka termi</text><text x="306" y="316" font-size="17" fill="#8A6A00">muokkaa</text><text x="542" y="316" font-size="17" fill="#3A4253">kohderyhmä ei tunne käsitettä</text><text x="96" y="372" font-size="17" fill="#1B2336">keksitty painike</text><text x="306" y="372" font-size="17" fill="#A43B25">poista</text><text x="542" y="372" font-size="17" fill="#3A4253">ei ole käyttöliittymässä</text><rect x="74" y="430" width="812" height="52" rx="12" fill="#F4EFFC"/><text x="104" y="463" font-size="18" font-weight="700" fill="#6A309D">Muokkaus on valinta, ei vain tekstin siistimistä.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Testilukija etsii kitkaa</text><text x="74" y="132" font-size="19" fill="#5A6478">Pyydä palautetta, älä valmista uudelleenkirjoitusta.</text><rect x="74" y="174" width="812" height="224" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><text x="104" y="218" font-size="18" font-weight="800" fill="#6A309D">ANNA VERSIO 2 JA KOHDERYHMÄ. KYSY:</text><g font-size="19" fill="#1B2336"><text x="104" y="270">• Missä kohdassa käyttäjä voisi jäädä jumiin?</text><text x="104" y="318">• Mitä termiä ei ole selitetty?</text><text x="104" y="366">• Minkä oletuksen ohje jättää sanomatta?</text></g><rect x="74" y="428" width="812" height="54" rx="12" fill="#FFF7E2"/><text x="104" y="462" font-size="17" font-weight="700" fill="#8A6A00">Simuloitu lukija ei korvaa oikeaa käyttäjätestiä.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Palaute on jälleen ehdotus</text><text x="74" y="132" font-size="19" fill="#5A6478">Sama vastuu ei katoa toisellakaan tekoälykierroksella.</text><g text-anchor="middle"><rect x="74" y="202" width="224" height="120" rx="16" fill="#F0F9F4" stroke="#2F9E69" stroke-width="2"/><text x="186" y="252" font-size="23" font-weight="800" fill="#247A52">HYVÄKSY</text><text x="186" y="286" font-size="16" fill="#3A4253">sopii tavoitteeseen</text><rect x="368" y="202" width="224" height="120" rx="16" fill="#FFF7E2" stroke="#C79100" stroke-width="2"/><text x="480" y="252" font-size="23" font-weight="800" fill="#8A6A00">MUOKKAA</text><text x="480" y="286" font-size="16" fill="#3A4253">idea auttaa, muoto ei</text><rect x="662" y="202" width="224" height="120" rx="16" fill="#FFF0EC" stroke="#D86A4C" stroke-width="2"/><text x="774" y="252" font-size="23" font-weight="800" fill="#A43B25">HYLKÄÄ</text><text x="774" y="286" font-size="16" fill="#3A4253">ei sovi tehtävään</text></g><rect x="140" y="386" width="680" height="68" rx="12" fill="#F4EFFC"/><text x="480" y="427" text-anchor="middle" font-size="19" font-weight="700" fill="#6A309D">Kirjaa myös hylkäys. Se näyttää harkinnan.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="98" font-size="38" font-weight="800" fill="#1B2336">Työparisyklin näyttö</text><g font-size="18"><rect x="74" y="152" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="188" fill="#1B2336">1. Tekoälyn alkuperäinen luonnos</text><rect x="74" y="222" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="258" fill="#1B2336">2. Ihmisen muokkaama versio ja tarkistuslähteet</text><rect x="74" y="292" width="812" height="56" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="328" fill="#1B2336">3. Testilukijan palaute</text><rect x="74" y="362" width="812" height="56" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="104" y="398" fill="#6A309D" font-weight="700">4. Lopullinen tuotos ja perusteltu päätösloki</text></g><text x="74" y="466" font-size="20" font-weight="800" fill="#1B2336">Mikä lopputuloksessa on selvästi sinun ratkaisuasi?</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">8 / 8</text></svg></div>
