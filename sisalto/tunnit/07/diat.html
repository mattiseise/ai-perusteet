<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#fff"/><rect x="0" width="12" height="540" fill="#3B5BDB"/><text x="74" y="96" font-size="38" font-weight="800" fill="#1B2336">Muista kolme asiaa</text><text x="96" y="188" font-size="23" fill="#1B2336">Sujuva väite tarkistetaan luotettavasta lähteestä.</text><text x="96" y="270" font-size="23" fill="#1B2336">Väärä positiivinen ja väärä negatiivinen ovat eri virheitä.</text><text x="96" y="352" font-size="23" fill="#1B2336">Mittari saa merkityksen vasta seurauksen yhteydessä.</text><text x="74" y="444" font-size="20" font-weight="700" fill="#2F46B0">Vastuu tarkistuksesta kuuluu ihmiselle ja organisaatiolle.</text><text x="893" y="512" text-anchor="end" font-size="14" fill="#9AA6BD">10 / 10</text></svg></div>
