<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="92" font-size="15" letter-spacing="3" fill="#7E88A8">02 · TEKOÄLYJEN KÄYTTÖ · OPPITUNTI 15</text><text x="74" y="230" font-size="50" font-weight="800" fill="#1B2336">Oma botti II</text><text x="74" y="288" font-size="27" fill="#5A6478">Tietopohja ja testisuunnitelma</text><rect x="74" y="350" width="812" height="74" rx="15" fill="#F4EFFC" stroke="#D9C3EC" stroke-width="2"/><text x="104" y="380" font-size="18" font-weight="700" fill="#6A309D">Päätä lähteet ja onnistumisen ehdot ennen rakentamista.</text><text x="104" y="407" font-size="17" fill="#3A4253">Ensimmäiset testit ajetaan vasta tunnilla 17.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">1 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Tietopohja ei ole tiedostokasa</text><text x="74" y="132" font-size="19" fill="#5A6478">Jokaisella lähteellä pitää olla tehtävä.</text><rect x="74" y="170" width="812" height="218" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><g font-size="19"><text x="104" y="218" font-weight="800" fill="#6A309D">TIETOTARVE</text><text x="286" y="218" fill="#3A4253">Mitä botin pitää tietää?</text><text x="104" y="278" font-weight="800" fill="#6A309D">LÄHDE</text><text x="286" y="278" fill="#3A4253">Mikä dokumentti vastaa juuri tähän?</text><text x="104" y="338" font-weight="800" fill="#6A309D">RAJA</text><text x="286" y="338" fill="#3A4253">Mitä lähde ei kata?</text></g><rect x="74" y="420" width="812" height="62" rx="12" fill="#FFF7E2"/><text x="104" y="458" font-size="18" font-weight="700" fill="#8A6A00">Kolme perusteltua lähdettä voi olla parempi kuin kaksikymmentä sekavaa.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">2 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Arvioi jokainen lähde</text><g font-size="18"><rect x="74" y="158" width="386" height="110" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="198" font-size="20" font-weight="800" fill="#6A309D">LUOTETTAVUUS</text><text x="104" y="235" fill="#3A4253">Kuka tiedon tuotti?</text><rect x="500" y="158" width="386" height="110" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="530" y="198" font-size="20" font-weight="800" fill="#6A309D">AJANTASAISUUS</text><text x="530" y="235" fill="#3A4253">Onko tieto edelleen voimassa?</text><rect x="74" y="298" width="386" height="110" rx="15" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="338" font-size="20" font-weight="800" fill="#6A309D">KATTAVUUS</text><text x="104" y="375" fill="#3A4253">Mihin tietotarpeeseen se vastaa?</text><rect x="500" y="298" width="386" height="110" rx="15" fill="#F4EFFC" stroke="#863FC4"/><text x="530" y="338" font-size="20" font-weight="800" fill="#6A309D">JÄLJITETTÄVYYS</text><text x="530" y="375" fill="#3A4253">Voiko väitteen palauttaa lähteeseen?</text></g><text x="74" y="458" font-size="18" font-weight="700" fill="#1B2336">Tarkista myös lupa, henkilötiedot ja luottamuksellisuus.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">3 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Kirjaa aukko näkyviin</text><text x="74" y="132" font-size="19" fill="#5A6478">Tietopohjan puute muutetaan toimintasäännöksi ja testiksi.</text><rect x="74" y="174" width="812" height="218" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><g font-size="19"><text x="104" y="222" font-weight="800" fill="#A43B25">AUKKO</text><text x="260" y="222" fill="#3A4253">Harjoituspaikka puuttuu hyväksytyistä ohjeista.</text><text x="104" y="286" font-weight="800" fill="#8A6A00">TOIMINTA</text><text x="260" y="286" fill="#3A4253">Botti kertoo tiedon puuttuvan eikä arvaa.</text><text x="104" y="350" font-weight="800" fill="#247A52">TESTI</text><text x="260" y="350" fill="#3A4253">Kysy paikkaa ja tarkista, ettei vastaus keksi osoitetta.</text></g><rect x="74" y="424" width="812" height="58" rx="12" fill="#F4EFFC"/><text x="104" y="460" font-size="18" font-weight="700" fill="#6A309D">Tunnettu aukko on hallittava. Piilotettu aukko on riski.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">4 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Kolme testityyppiä</text><g text-anchor="middle"><rect x="74" y="174" width="250" height="190" rx="18" fill="#F0F9F4" stroke="#2F9E69" stroke-width="2"/><text x="199" y="222" font-size="22" font-weight="800" fill="#247A52">POSITIIVINEN</text><text x="199" y="272" font-size="17" fill="#3A4253">tietopohjassa oleva</text><text x="199" y="302" font-size="17" fill="#3A4253">tavallinen kysymys</text><rect x="355" y="174" width="250" height="190" rx="18" fill="#FFF7E2" stroke="#C79100" stroke-width="2"/><text x="480" y="222" font-size="22" font-weight="800" fill="#8A6A00">NEGATIIVINEN</text><text x="480" y="272" font-size="17" fill="#3A4253">pyyntö, josta pitää</text><text x="480" y="302" font-size="17" fill="#3A4253">kieltäytyä tai ohjata</text><rect x="636" y="174" width="250" height="190" rx="18" fill="#F4EFFC" stroke="#863FC4" stroke-width="2"/><text x="761" y="222" font-size="22" font-weight="800" fill="#6A309D">REUNATAPAUS</text><text x="761" y="272" font-size="17" fill="#3A4253">tyhjä, sekava tai</text><text x="761" y="302" font-size="17" fill="#3A4253">poikkeava syöte</text></g><text x="74" y="432" font-size="18" font-weight="700" fill="#1B2336">Testaa ydintoiminnan lisäksi rajat ja poikkeukset.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">5 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FAFBFE"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Testitapaus on enemmän kuin kysymys</text><rect x="74" y="158" width="812" height="248" rx="18" fill="#FFFFFF" stroke="#D8DEEC" stroke-width="2"/><g font-size="19"><text x="104" y="208" font-weight="800" fill="#6A309D">SYÖTE</text><text x="286" y="208" fill="#3A4253">”Milloin kerhon harjoitus alkaa?”</text><text x="104" y="270" font-weight="800" fill="#6A309D">ODOTUS</text><text x="286" y="270" fill="#3A4253">Botti antaa päivän ja kellonajan lähteestä.</text><text x="104" y="332" font-weight="800" fill="#6A309D">LÄPÄISYEHTO</text><text x="286" y="332" fill="#3A4253">Molemmat ovat oikein ja lähde on nimetty.</text><text x="104" y="384" font-weight="800" fill="#6A309D">TARKISTUS</text><text x="286" y="384" fill="#3A4253">Kerhon hyväksytty aikatauluohje.</text></g><rect x="74" y="434" width="812" height="48" rx="12" fill="#FFF7E2"/><text x="104" y="465" font-size="17" font-weight="700" fill="#8A6A00">”Vastaa hyvin” ei ole tarkistettava läpäisyehto.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">6 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><text x="74" y="92" font-size="38" font-weight="800" fill="#1B2336">Älä siirrä maaliviivaa</text><text x="74" y="132" font-size="19" fill="#5A6478">Testin odotus säilytetään ensimmäiseen ajoon asti.</text><g font-size="17" text-anchor="middle"><rect x="74" y="204" width="160" height="72" rx="14" fill="#F4EFFC" stroke="#863FC4"/><text x="154" y="247" fill="#6A309D" font-weight="700">KIRJOITA TESTI</text><path d="M248 240 H300" stroke="#9AA6BD" stroke-width="3"/><path d="M300 240 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="314" y="204" width="140" height="72" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="384" y="247" fill="#1B2336">RAKENNA</text><path d="M468 240 H520" stroke="#9AA6BD" stroke-width="3"/><path d="M520 240 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="534" y="204" width="140" height="72" rx="14" fill="#FAFBFE" stroke="#D8DEEC"/><text x="604" y="247" fill="#1B2336">AJA TESTI</text><path d="M688 240 H740" stroke="#9AA6BD" stroke-width="3"/><path d="M740 240 l-10 -6 v12 z" fill="#9AA6BD"/><rect x="754" y="204" width="132" height="72" rx="14" fill="#F0F9F4" stroke="#2F9E69"/><text x="820" y="247" fill="#247A52" font-weight="700">KORJAA</text></g><rect x="100" y="338" width="760" height="94" rx="14" fill="#FFF0EC" stroke="#D86A4C"/><text x="130" y="374" font-size="18" font-weight="800" fill="#A43B25">Jos tulos poikkeaa odotuksesta, älä muuta odotusta automaattisesti.</text><text x="130" y="406" font-size="17" fill="#3A4253">Tutki, onko korjattava toteutusta, aineistoa vai itse testin perustelua.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">7 / 8</text></svg></div>

<div class="deck-slide"><svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif"><rect width="960" height="540" fill="#FFFFFF"/><rect width="12" height="540" fill="#863FC4"/><text x="74" y="98" font-size="38" font-weight="800" fill="#1B2336">Rakennuspalikka 3</text><g font-size="18"><rect x="74" y="152" width="812" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="189" fill="#1B2336">3–5 perusteltua lähdettä ja niiden tietotarpeet</text><rect x="74" y="224" width="812" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="261" fill="#1B2336">Arvio luotettavuudesta, ajantasaisuudesta ja kattavuudesta</text><rect x="74" y="296" width="812" height="58" rx="12" fill="#FAFBFE" stroke="#D8DEEC"/><text x="104" y="333" fill="#1B2336">Tunnetut aukot ja toiminta tiedon puuttuessa</text><rect x="74" y="368" width="812" height="58" rx="12" fill="#F4EFFC" stroke="#863FC4"/><text x="104" y="405" fill="#6A309D" font-weight="700">Positiivinen, negatiivinen ja reunatapaus odotuksineen</text></g><text x="74" y="470" font-size="18" font-weight="700" fill="#1B2336">Tunnilla 17 rakennat ja ajat testit ensimmäisen kerran.</text><text x="893" y="514" text-anchor="end" font-size="14" fill="#9AA6BD">8 / 8</text></svg></div>
